          <div class="logo__text">PETWORLD</div>
        </div>
        <!-- Я не впевнений що я правильно це все діло називаю -->
        <div class="authentication">
          <!-- Я не знаю чи потрібно огортати а тег div тегом? Чи можна було якось зробити один div тег з 
            якимось посиланням через може якийсь атрибут чи що? що каже практика по цьому? -->
          <div class="authentication__sign-up-button"><a class="authentication__sign-up-link" href="#">Sing Up</a></div>
          <!-- Але якщо одна це є кнопка, а друга це посилання.. То мені та і робити? один буде div кнопка + a, а інший буде лише a? -->
          <div class="authentication__log-in-button"><a class="authentication__log-in-link" href="#">Log In</a></div>
        </div>
      </div>
      <div class="intro">
        <!-- Чи тут я правильно називаю за методикою BEM? -->
        <div class="description">
          <div class="description__title">Pet Store & Beyond</div>
          <div class="description__subtitle">This is a sample landing page, created with Figma and Anima. No coding involved.</div>
          <!-- Я вимушений давади кнопку до description але це тоді дивно получається відносно назв BEM  -->
          <button class="intro__button">Get Started</button>
        </div>
        <div class="intro_image"><img src="assets/Image.png" alt="Image with Cool Docs" width="500" height="460" /></div>
      </div>
      <div class="trailer-box">
        <div class="trailer-video">
          <img class="trailer-video__image" src="assets/video.png" alt="Video trailer" width="765" height="460" />
          <!-- Тут є окремий div елемент який реалізований у вигляді градієнта.
           І питання чи правильний я підхід вибрав? Чи потрібно було модифікатор застосовувати?
           Але якщо так то потрібен був би новий елемент для градієнта -->
          <div class="trailer-video__gradient"></div>
          <svg class="trailer-video__icon" width="43" height="47" viewBox="0 0 43 47" fill="none" xmlns="http://www.w3.org/2000/svg">
